<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ONE SUPER CUP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 850px;
            background: #000000;
            border-radius: 40px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid #222;
        }

        .top-gradient {
            background-image: url('https://i.pinimg.com/1200x/7b/5e/b4/7b5eb4dd5305ea8427b75b91597df10b.jpg');
            background-size: cover;
            background-position: center;
            height: 250px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            padding: 50px 25px 25px 25px;
        }

        .card-bg-img {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }
        
        .card-overlay {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
        }

        .transaction-card {
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            margin-bottom: 16px;
            height: 90px;
            overflow: hidden;
            display: block;
            text-decoration: none;
        }

        .neon-red:hover { box-shadow: 0 0 20px rgba(239, 68, 68, 0.6); transform: translateY(-2px); }
        .neon-blue:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); transform: translateY(-2px); }
        .neon-green:hover { box-shadow: 0 0 20px rgba(14, 115, 237, 0.6); transform: translateY(-2px); }
        .neon-purple:hover { box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-gradient"></div>

    <div class="flex-1 p-6 text-white overflow-y-auto">
        <h2 class="text-xl font-semibold mb-6">SUPER CUP FIXTURES</h2>

        <!-- Player Lists -->
        <a href="https://supercupepl.ziokai2212006.workers.dev/" target="_blank" class="transaction-card neon-red card-bg-img" style="background-image: url('https://i.pinimg.com/1200x/14/0b/1b/140b1ba53fcfe5cefa07d01fce33d67e.jpg');">
            <div class="card-overlay">
                <div class="flex-1">
                    <p class="font-bold text-white text-lg">English Premier League</p>
                    <p class="text-xs text-gray-400">Tap to view details</p>
                </div>
            </div>
        </a>

        <!-- Match Fixtures -->
        <a href="https://laligasupercup.ziokai2212006.workers.dev/" target="_blank" class="transaction-card neon-green card-bg-img" style="background-image: url('https://i.pinimg.com/736x/7f/39/43/7f3943c78291053c80b4352041d19ce4.jpg');">
            <div class="card-overlay">
                <div class="flex-1">
                    <p class="font-bold text-white text-lg">Spain LaLiga</p>
                    <p class="text-xs text-gray-400">Tap to view details</p>
                </div>
            </div>
        </a>

        <!-- Send Result -->
        <a href="" target="_blank" class="transaction-card neon-blue card-bg-img" style="background-image: url('https://i.pinimg.com/736x/8a/a4/6d/8aa46daeb36e14466570cf7f20c87da9.jpg');">
            <div class="card-overlay">
                <div class="flex-1">
                    <p class="font-bold text-white text-lg">Italy Serie A</p>
                    <p class="text-xs text-gray-400">Tap to send result</p>
                </div>
            </div>
        </a>

        <!-- Coin Store -->
        <a href="https://myanmarsupercup.ziokai2212006.workers.dev/" target="_blank" class="transaction-card neon-purple card-bg-img" style="background-image: url('https://i.pinimg.com/736x/f6/d4/62/f6d462a853fe6a9c5bee1d92e11f0e6f.jpg');">
            <div class="card-overlay">
                <div class="flex-1">
                    <p class="font-bold text-white text-lg">German Bundesliga</p>
                    <p class="text-xs text-gray-400">Tap to view details</p>
                </div>
            </div>
        </a>

    </div>
</div>

</body>
</html>
